name: myenv
channels:
  - nvidia
  - pytorch
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - pytorch=2.1.0
  - torchvision
  - torchaudio
  - pytorch-cuda=11.8
  - pip
  - pip:
      - deepwave
      - matplotlib
      - numpy
      - scipy
      - scikit-image
      - -i https://pypi.tuna.tsinghua.edu.cn/simple
